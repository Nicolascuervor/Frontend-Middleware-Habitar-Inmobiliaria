<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portal de asesores - Habitar Inmobiliaria">
    <title>Habitar Inmobiliaria - Acceso Asesores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/login/login.css">
</head>

<body>

    <!-- Background watermark logo -->
    <div class="bg-watermark" aria-hidden="true"></div>

    <main class="login-wrapper">
        <div class="login-card">

            <!-- Logo -->
            <div class="login-logo">
                <img src="assets/images/habitar-logo.png" alt="Habitar Inmobiliaria" />
            </div>

            <!-- Header -->
            <div class="login-header">
                <h1>Acceso Asesores</h1>
                <p>Ingresa con tus credenciales para continuar</p>
            </div>

            <!-- Form -->
            <form id="login-form" class="login-form" novalidate>

                <div class="form-group">
                    <label for="correo">Correo electrónico</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✉</span>
                        <input type="email" id="correo" name="correo" placeholder="tu@correo.com" autocomplete="email"
                            required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" name="password" placeholder="••••••••"
                            autocomplete="current-password" required />
                        <button type="button" id="toggle-password" class="toggle-password"
                            aria-label="Mostrar contraseña">
                            👁
                        </button>
                    </div>
                </div>

                <!-- Error Message -->
                <div id="error-message" class="error-message hidden" role="alert">
                    <span>⚠</span>
                    <p id="error-text">Credenciales incorrectas. Intenta de nuevo.</p>
                </div>

                <!-- Submit -->
                <button type="submit" id="submit-btn" class="btn-login">
                    <span id="btn-text">Ingresar</span>
                    <span id="btn-spinner" class="btn-spinner hidden"></span>
                </button>

            </form>

            <p class="login-footer">
                ¿Problemas para acceder? Contacta a tu administrador.
            </p>

        </div>
    </main>

    <script src="js/shared/api-error-handler.js"></script>
    <script src="js/login/login.js"></script>
</body>

</html>
